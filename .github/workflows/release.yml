name: Module Release

on:
  workflow_call:
    inputs:
      release_tag:
        required: true
        type: string
      release_title:
        required: true
        type: string
      rolling_release:
        required: true
        type: boolean
      version_name:
        required: true
        type: string
      version_code:
        required: true
        type: string
      commit_sha:
        required: true
        type: string
      commit_full_sha:
        required: true
        type: string
      commit_url:
        required: true
        type: string
      build_duration:
        required: true
        type: string
      release_zip_name:
        required: true
        type: string
      debug_zip_name:
        required: true
        type: string
      release_sha256:
        required: true
        type: string
      debug_sha256:
        required: true
        type: string

permissions:
  contents: write

defaults:
  run:
    shell: bash

jobs:
  release:
    name: Publish release
    runs-on: ubuntu-24.04

    steps:
      - name: Download module zips
        uses: actions/download-artifact@v8
        with:
          name: module-zips
          path: dist/zips

      - name: Download build metadata
        uses: actions/download-artifact@v8
        with:
          name: build-metadata
          path: dist/metadata

      - name: Prepare release note
        env:
          RELEASE_TITLE: ${{ inputs.release_title }}
          VERSION_NAME: ${{ inputs.version_name }}
          VERSION_CODE: ${{ inputs.version_code }}
          COMMIT_SHA: ${{ inputs.commit_sha }}
          COMMIT_URL: ${{ inputs.commit_url }}
          BUILD_DURATION: ${{ inputs.build_duration }}
          RELEASE_ZIP_NAME: ${{ inputs.release_zip_name }}
          DEBUG_ZIP_NAME: ${{ inputs.debug_zip_name }}
          RELEASE_SHA256: ${{ inputs.release_sha256 }}
          DEBUG_SHA256: ${{ inputs.debug_sha256 }}
        run: |
          set -euo pipefail

          {
            echo "# ${RELEASE_TITLE}"
            echo
            echo "- **Version:** \`${VERSION_NAME}\`"
            echo "- **VersionCode:** \`${VERSION_CODE}\`"
            echo "- **Commit:** [\`${COMMIT_SHA}\`](${COMMIT_URL})"
            echo "- **Build time:** \`${BUILD_DURATION}\`"
            echo
            echo "## Assets"
            echo
            echo "- \`${RELEASE_ZIP_NAME}\`"
            echo "- \`${DEBUG_ZIP_NAME}\`"
            echo
            echo "## SHA256"
            echo
            echo "- Release: \`${RELEASE_SHA256}\`"
            echo "- Debug: \`${DEBUG_SHA256}\`"
            echo
            echo "## Message"
            echo
            echo '```text'
            cat dist/metadata/commit-message.txt
            echo '```'
          } > release-note.md

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.release_tag }}
          name: ${{ inputs.release_title }}
          draft: false
          prerelease: false
          body_path: release-note.md
          overwrite_files: ${{ inputs.rolling_release }}
          fail_on_unmatched_files: true
          files: |
            dist/zips/Sui-*-release.zip
            dist/zips/Sui-*-debug.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Move rolling release tag to the built commit
        if: ${{ inputs.rolling_release }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ inputs.release_tag }}
          COMMIT_FULL_SHA: ${{ inputs.commit_full_sha }}
        run: |
          set -euo pipefail

          tag_ref="repos/${GITHUB_REPOSITORY}/git/refs/tags/${RELEASE_TAG}"
          if gh api "$tag_ref" >/dev/null 2>&1; then
            gh api --method PATCH "$tag_ref" \
              -f sha="$COMMIT_FULL_SHA" \
              -F force=true >/dev/null
          else
            gh api --method POST "repos/${GITHUB_REPOSITORY}/git/refs" \
              -f ref="refs/tags/${RELEASE_TAG}" \
              -f sha="$COMMIT_FULL_SHA" >/dev/null
          fi

          actual_sha=""
          for attempt in {1..30}; do
            actual_sha="$(
              gh api -H 'Cache-Control: no-cache' "$tag_ref" --jq '.object.sha' 2>/dev/null || true
            )"
            if [ "$actual_sha" = "$COMMIT_FULL_SHA" ]; then
              break
            fi
            echo "Wait for ${RELEASE_TAG} to resolve to ${COMMIT_FULL_SHA} (${attempt}/30, current=${actual_sha:-missing})"
            sleep 2
          done

          if [ "$actual_sha" != "$COMMIT_FULL_SHA" ]; then
            echo "${RELEASE_TAG} still resolves to ${actual_sha:-missing}, expected ${COMMIT_FULL_SHA}" >&2
            exit 1
          fi
