name: Pages Metadata

on:
  workflow_call:
    inputs:
      release_tag:
        required: true
        type: string
      release_title:
        required: true
        type: string
      version_code:
        required: true
        type: string
      version_short:
        required: true
        type: string
      release_zip_name:
        required: true
        type: string
      commit_sha:
        required: true
        type: string
      commit_url:
        required: true
        type: string
      build_duration:
        required: true
        type: string
      release_sha256:
        required: true
        type: string

permissions:
  contents: write
  pages: write
  id-token: write

defaults:
  run:
    shell: bash

jobs:
  pages:
    name: Update pages metadata
    runs-on: ubuntu-24.04
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Download build metadata
        uses: actions/download-artifact@v8
        with:
          name: build-metadata
          path: dist/metadata

      - name: Update sui_zygisk.json and changelog in pages branch
        env:
          RELEASE_TAG: ${{ inputs.release_tag }}
          RELEASE_TITLE: ${{ inputs.release_title }}
          VERSION_CODE: ${{ inputs.version_code }}
          VERSION_SHORT: ${{ inputs.version_short }}
          RELEASE_ZIP_NAME: ${{ inputs.release_zip_name }}
          COMMIT_SHA: ${{ inputs.commit_sha }}
          COMMIT_URL: ${{ inputs.commit_url }}
          BUILD_DURATION: ${{ inputs.build_duration }}
          RELEASE_SHA256: ${{ inputs.release_sha256 }}
        run: |
          set -euo pipefail

          OWNER="${GITHUB_REPOSITORY%%/*}"
          REPO="${GITHUB_REPOSITORY#*/}"
          OWNER_LOWER="$(printf '%s' "$OWNER" | tr '[:upper:]' '[:lower:]')"
          REPO_URL="https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${GITHUB_REPOSITORY}"
          RELEASE_URL="https://github.com/${GITHUB_REPOSITORY}/releases/tag/${RELEASE_TAG}"
          ZIP_URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/${RELEASE_TAG}/${RELEASE_ZIP_NAME}"
          CHANGELOG_URL="https://raw.githubusercontent.com/${GITHUB_REPOSITORY}/pages/README.md"
          RAW_UPDATE_JSON_URL="https://raw.githubusercontent.com/${GITHUB_REPOSITORY}/pages/sui_zygisk.json"
          PAGES_UPDATE_JSON_URL="https://${OWNER_LOWER}.github.io/${REPO}/sui_zygisk.json"

          if git ls-remote --exit-code --heads "$REPO_URL" pages >/dev/null 2>&1; then
            git clone --depth=1 --branch pages "$REPO_URL" pages
            cd pages
          else
            git clone --depth=1 "$REPO_URL" pages
            cd pages
            git checkout --orphan pages
            git rm -rf . >/dev/null 2>&1 || true
          fi

          {
            echo "# ${RELEASE_TITLE}"
            echo
            echo "- **Version:** \`${VERSION_SHORT}\`"
            echo "- **VersionCode:** \`${VERSION_CODE}\`"
            echo "- **Release:** [${RELEASE_TAG}](${RELEASE_URL})"
            echo "- **Download:** [${RELEASE_ZIP_NAME}](${ZIP_URL})"
            echo "- **Update JSON:** [raw](${RAW_UPDATE_JSON_URL})"
            echo "- **GitHub Pages:** [sui_zygisk.json](${PAGES_UPDATE_JSON_URL})"
            echo "- **Commit:** [\`${COMMIT_SHA}\`](${COMMIT_URL})"
            echo "- **Build time:** \`${BUILD_DURATION}\`"
            echo "- **SHA256:** \`${RELEASE_SHA256}\`"
            echo
            echo "## Message"
            echo
            echo '```text'
            cat ../dist/metadata/commit-message.txt
            echo '```'
          } > README.md

          cat > sui_zygisk.json <<EOF
          {
            "versionCode": ${VERSION_CODE},
            "version": "${VERSION_SHORT}",
            "zipUrl": "${ZIP_URL}",
            "changelog": "${CHANGELOG_URL}"
          }
          EOF

          touch .nojekyll

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add README.md sui_zygisk.json .nojekyll

          if ! git diff --staged --quiet; then
            git commit -m "Update pages metadata (versionCode=${VERSION_CODE})"
            git push origin pages
          else
            echo "No changes, skip."
          fi

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: pages

      - name: Deploy GitHub Pages compatibility endpoint
        id: deployment
        uses: actions/deploy-pages@v4
